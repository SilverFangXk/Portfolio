<svg viewBox="0 0 1050 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowM" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#57534e"/>
    </marker>
  </defs>
  <rect width="1050" height="620" fill="#fafaf9"/>

  <text x="525" y="35" text-anchor="middle" fill="#1c1917" font-family="Arial, sans-serif" font-size="20" font-weight="bold">
    Three Architectures for ECG Arrhythmia Classification
  </text>

  <!-- Column dividers -->
  <line x1="350" y1="60" x2="350" y2="600" stroke="#e7e5e4" stroke-width="1"/>
  <line x1="700" y1="60" x2="700" y2="600" stroke="#e7e5e4" stroke-width="1"/>

  <!-- ===================== COLUMN 1: CNN ===================== -->
  <text x="175" y="75" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="16" font-weight="bold">CNN</text>

  <rect x="105" y="95" width="140" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="175" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">ECG Input</text>
  <line x1="175" y1="137" x2="175" y2="152" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="105" y="157" width="140" height="42" rx="8" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="175" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Conv1D</text>
  <line x1="175" y1="199" x2="175" y2="214" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="105" y="219" width="140" height="42" rx="8" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="175" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">MaxPool1D</text>
  <line x1="175" y1="261" x2="175" y2="276" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="105" y="281" width="140" height="42" rx="8" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="175" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Conv1D</text>
  <line x1="175" y1="323" x2="175" y2="338" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="105" y="343" width="140" height="42" rx="8" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="175" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">MaxPool1D</text>
  <line x1="175" y1="385" x2="175" y2="400" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="105" y="405" width="140" height="42" rx="8" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="175" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Dense</text>
  <line x1="175" y1="447" x2="175" y2="462" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="105" y="467" width="140" height="42" rx="8" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <text x="175" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Softmax (5)</text>

  <rect x="95" y="530" width="160" height="45" rx="10" fill="#1d4ed8"/>
  <text x="175" y="550" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Accuracy</text>
  <text x="175" y="567" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">98.33%</text>

  <!-- ===================== COLUMN 2: Bi-LSTM ===================== -->
  <text x="525" y="75" text-anchor="middle" fill="#0d9488" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Bidirectional LSTM</text>

  <rect x="455" y="115" width="140" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="525" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">ECG Input</text>
  <line x1="525" y1="157" x2="525" y2="172" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="455" y="177" width="140" height="52" rx="8" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5"/>
  <text x="525" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Bi-LSTM</text>
  <line x1="525" y1="229" x2="525" y2="244" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="455" y="249" width="140" height="52" rx="8" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5"/>
  <text x="525" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Bi-LSTM</text>
  <line x1="525" y1="301" x2="525" y2="316" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="455" y="321" width="140" height="42" rx="8" fill="#fef08a" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="525" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Dropout</text>
  <line x1="525" y1="363" x2="525" y2="378" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="455" y="383" width="140" height="42" rx="8" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="525" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Dense</text>
  <line x1="525" y1="425" x2="525" y2="440" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="455" y="445" width="140" height="42" rx="8" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <text x="525" y="471" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Softmax (5)</text>

  <rect x="445" y="530" width="160" height="45" rx="10" fill="#0d9488"/>
  <text x="525" y="550" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Focus</text>
  <text x="525" y="567" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Temporal patterns</text>

  <!-- ===================== COLUMN 3: Hybrid CNN-LSTM ===================== -->
  <text x="875" y="75" text-anchor="middle" fill="#b45309" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Hybrid CNN-LSTM</text>

  <rect x="805" y="95" width="140" height="42" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="875" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">ECG Input</text>
  <line x1="875" y1="137" x2="875" y2="152" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="805" y="157" width="140" height="42" rx="8" fill="#93c5fd" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="875" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Conv1D</text>
  <line x1="875" y1="199" x2="875" y2="214" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="805" y="219" width="140" height="42" rx="8" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="875" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">MaxPool1D</text>
  <line x1="875" y1="261" x2="875" y2="276" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="805" y="281" width="140" height="52" rx="8" fill="#99f6e4" stroke="#0d9488" stroke-width="1.5"/>
  <text x="875" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Bi-LSTM</text>
  <line x1="875" y1="333" x2="875" y2="348" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="805" y="353" width="140" height="42" rx="8" fill="#c4b5fd" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="875" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Dense</text>
  <line x1="875" y1="395" x2="875" y2="410" stroke="#57534e" stroke-width="2" marker-end="url(#arrowM)"/>

  <rect x="805" y="415" width="140" height="42" rx="8" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <text x="875" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Softmax (5)</text>

  <rect x="795" y="530" width="160" height="45" rx="10" fill="#b45309"/>
  <text x="875" y="550" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Accuracy</text>
  <text x="875" y="567" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">88%</text>

  <text x="525" y="605" text-anchor="middle" fill="#78716c" font-family="Arial, sans-serif" font-size="12">
    CNN → local morphology · LSTM → temporal dependencies · Hybrid → combines both
  </text>
</svg>
