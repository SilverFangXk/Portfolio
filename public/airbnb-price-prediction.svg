<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgAir" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrowAir" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1000" height="300" fill="url(#bgAir)"/>

  <!-- CSV -->
  <g>
    <rect x="15" y="110" width="130" height="90" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text x="80" y="162" text-anchor="middle" fill="#bae6fd" font-family="Arial, sans-serif" font-size="16" font-weight="bold">CSV</text>
  </g>
  <line x1="145" y1="155" x2="188" y2="155" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowAir)"/>

  <!-- Spark -->
  <g>
    <rect x="193" y="110" width="130" height="90" rx="12" fill="#0c4a6e" stroke="#38bdf8" stroke-width="2"/>
    <text x="258" y="162" text-anchor="middle" fill="#e0f2fe" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Spark</text>
  </g>
  <line x1="323" y1="155" x2="366" y2="155" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowAir)"/>

  <!-- Data Pipeline (preprocessing) -->
  <g>
    <rect x="371" y="100" width="210" height="110" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text x="476" y="140" text-anchor="middle" fill="#bae6fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Data Pipeline</text>
    <text x="476" y="160" text-anchor="middle" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="10">StringIndexer · Imputer</text>
    <text x="476" y="176" text-anchor="middle" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="10">OneHotEncoder</text>
    <text x="476" y="192" text-anchor="middle" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="10">VectorAssembler</text>
  </g>
  <line x1="581" y1="155" x2="624" y2="155" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowAir)"/>

  <!-- Random Forest (MLlib) -->
  <g>
    <rect x="629" y="105" width="180" height="100" rx="12" fill="#0c4a6e" stroke="#38bdf8" stroke-width="2"/>
    <text x="719" y="145" text-anchor="middle" fill="#e0f2fe" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Random Forest</text>
    <text x="719" y="165" text-anchor="middle" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="11">MLlib · Cross Validation</text>
  </g>
  <line x1="809" y1="155" x2="852" y2="155" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowAir)"/>

  <!-- Prediction -->
  <g>
    <rect x="857" y="110" width="125" height="90" rx="12" fill="#1e293b" stroke="#facc15" stroke-width="2"/>
    <text x="919" y="162" text-anchor="middle" fill="#fde68a" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Prediction</text>
  </g>
</svg>
